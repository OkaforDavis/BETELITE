services:
  # Go backend API server
  - type: web
    name: betelite-backend
    env: docker
    region: oregon
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: GO_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: FIREBASE_PROJECT_ID
        value: betelite-crest
      - key: FIREBASE_DATABASE_URL
        value: https://betelite-crest-default-rtdb.firebaseio.com
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DETECTION_SERVICE_URL
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        value: pk_live_e2ebd7a376bd6f1e106400bba86935f9e6df381d
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  # AI Detection Service (LLM Vision OCR)
  - type: web
    name: betelite-detection
    env: docker
    region: oregon
    plan: free
    rootDir: detection_service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: false
