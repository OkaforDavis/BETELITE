services:
  - type: web
    name: betelite-backend
    env: docker
    rootDir: BETELITE_v3/BETELITE_v3/backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GO_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: "*"
        # Ensure you set DATABASE_URL, GEMINI_API_KEY, and other Go backend env vars in the Render dashboard.

  - type: web
    name: betelite-detection
    env: docker
    rootDir: BETELITE_v3/BETELITE_v3/detection_service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
        # Set GEMINI_API_KEY (or OPENAI_API_KEY / GROQ_API_KEY) in the Render dashboard.
        # The detection service uses LLM vision APIs for game score extraction.
