services:
  - type: web
    name: betelite-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GO_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: "*"
        # Ensure you set DATABASE_URL and other Go backend env vars in the Render dashboard.

  - type: web
    name: betelite-detection
    env: docker
    rootDir: detection_service
    plan: free
    # Make sure to set the ANTHROPIC_API_KEY in the Render dashboard if you use Anthropic models.
